        content.push({type:"text",text:`[Document joint: "${f.name}" — Utilise ce document comme référence pour enrichir le cours]`});
      } else if (f.type.startsWith("image/")) {
        content.push({type:"image",source:{type:"base64",media_type:f.type,data:f.data}});
        content.push({type:"text",text:`[Image jointe: "${f.name}" — Décris et intègre cette ressource visuelle dans le cours]`});
      } else {
        // text/csv/json/etc: include as text
        content.push({type:"text",text:`[Fichier joint: "${f.name}"]\n${f.text||"(contenu binaire non lisible)"}`});
      }
    }
    content.push({type:"text",text:u});
    const r = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":CK,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:MODEL,max_tokens:8000,system:s,messages:[{role:"user",content: files.length > 0 ? content : u}]})
    });
    const d = await r.json();
    addClaudeUsage(d.usage);
    return d.content?.[0]?.text || d.error?.message || "Erreur";
  } catch(e){return "Erreur: "+e.message;}
}

// ── File reading helpers ──
function readFileAsBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(",")[1]);
    r.onerror = () => rej(new Error("Lecture échouée"));
    r.readAsDataURL(file);
  });
}
function readFileAsText(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = () => rej(new Error("Lecture échouée"));
    r.readAsText(file);
  });
}
async function processFile(file) {
  const isPdf = file.type === "application/pdf";
  const isImage = file.type.startsWith("image/");
  const isText = file.type.startsWith("text/") || file.name.endsWith(".md") || file.name.endsWith(".json") || file.name.endsWith(".csv");
  if (isPdf || isImage) {
    const data = await readFileAsBase64(file);
    return {name: file.name, type: file.type, data, size: file.size};
  } else if (isText) {
    const text = await readFileAsText(file);
    return {name: file.name, type: file.type, text, size: file.size};
  } else {
    // Try as text
    try { const text = await readFileAsText(file); return {name: file.name, type: "text/plain", text, size: file.size}; }
    catch { return {name: file.name, type: file.type, text: "(format non supporté)", size: file.size}; }
  }
}

// ── Export : analyse du cours en blocs + générateurs HTML / PPTX / PDF ──
function stripMd(s){return (s||"").replace(/\[([^\]]+)\]\([^)]*\)/g,"$1").replace(/\*\*(.*?)\*\*/g,"$1").replace(/\*(.*?)\*/g,"$1").replace(/`/g,"").replace(/\s*\[(\d+)\]/g,"").replace(/\s{2,}/g," ").trim();}
function cleanKeepBold(s){return String(s||"").replace(/\[([^\]]+)\]\([^)]*\)/g,"$1").replace(/`/g,"").replace(/\s*\[(\d+)\]/g,"").replace(/\s{2,}/g," ").trim();}
function inlineHTML(s){
  let h=(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  h=h.replace(/\[([^\]]+)\]\(([^)]+)\)/g,"$1");
  h=h.replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>");
  h=h.replace(/\*([^*\n]+)\*/g,"<em>$1</em>");
  h=h.replace(/\[(\d+)\]/g,'<sup class="cit">[$1]</sup>');
  return h;
}
function schemaSteps(text){
  const clean=(text||"").replace(/^\[?(SCH[ÉE]MA|ORGANIGRAMME)[:\s]*/i,"").replace(/\]$/,"").trim();
  if(/→|->/.test(clean))return clean.split(/→|->/).map(x=>x.trim()).filter(Boolean);
  if(clean.indexOf("—")>-1)return clean.split("—").map(x=>x.trim()).filter(x=>x.length>1);
  if(clean.indexOf(",")>-1)return clean.split(",").map(x=>x.trim()).filter(Boolean);
  if(clean.indexOf("/")>-1)return clean.split("/").map(x=>x.trim()).filter(Boolean);
  return clean?[clean]:[];
}
function flowSVG(items){
  const cols=["#f97316","#3b82f6","#22c55e","#a855f7","#ec4899","#eab308","#14b8a6"];
  const n=Math.min(items.length,7); if(!n)return "";
  const bw=130,bh=46,gap=26,pad=12;
  const w=n*bw+(n-1)*gap+pad*2, h=bh+24;
  let s='<svg viewBox="0 0 '+w+' '+h+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:'+w+'px;height:auto;display:block;margin:0 auto">';
  for(let i=0;i<n;i++){
    const x=pad+i*(bw+gap),y=12,c=cols[i%cols.length];
    s+='<rect x="'+x+'" y="'+y+'" width="'+bw+'" height="'+bh+'" rx="10" fill="'+c+'"/>';
    const raw=(items[i]||"").length>20?(items[i].slice(0,19)+"…"):items[i];
    const t=raw.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    s+='<text x="'+(x+bw/2)+'" y="'+(y+bh/2+4)+'" text-anchor="middle" fill="#fff" font-size="12" font-weight="700" font-family="Inter,Arial,sans-serif">'+t+'</text>';
    if(i<n-1){const ax=x+bw,ay=y+bh/2;s+='<line x1="'+(ax+3)+'" y1="'+ay+'" x2="'+(ax+gap-7)+'" y2="'+ay+'" stroke="#94a3b8" stroke-width="2.5"/><polygon points="'+(ax+gap-9)+','+(ay-4)+' '+(ax+gap-2)+','+ay+' '+(ax+gap-9)+','+(ay+4)+'" fill="#94a3b8"/>';}
  }
  return s+'</svg>';
}
function parseBlocks(md){
  const lines=(md||"").split("\n"); const out=[]; let tb=[];
  const flush=()=>{ if(!tb.length)return; const rows=tb.map(l=>l.split("|").map(c=>c.trim()).filter(Boolean)).filter(r=>r.length); const body=rows.filter(r=>!r.every(c=>/^[-:]+$/.test(c))); if(body.length)out.push({t:"table",head:body[0],rows:body.slice(1)}); tb=[]; };
  lines.forEach(l=>{
    const s=l.trim();
    if(s.indexOf("|")===0){tb.push(s);return;}
    flush();
    if(!s)return;
    if(s.indexOf("# ")===0)out.push({t:"h1",x:s.slice(2)});
    else if(s.indexOf("## ")===0)out.push({t:"h2",x:s.slice(3)});
    else if(s.indexOf("### ")===0)out.push({t:"h3",x:s.slice(4)});
    else if(s.indexOf("#### ")===0)out.push({t:"h4",x:s.slice(5)});
    else if(/^\[SCH[ÉE]MA/i.test(s))out.push({t:"schema",x:s.replace(/^\[SCH[ÉE]MA[:\s]*/i,"").replace(/\]$/,"")});
    else if(/^\[ORGANIGRAMME/i.test(s))out.push({t:"schema",x:s.replace(/^\[ORGANIGRAMME[:\s]*/i,"").replace(/\]$/,"")});
    else if(s.indexOf("> ")===0)out.push({t:"quote",x:s.slice(2)});
    else if(/^[-*]\s/.test(s))out.push({t:"li",x:s.replace(/^[-*]\s/,"")});
    else if(/^\d+\.\s/.test(s))out.push({t:"li",x:s.replace(/^\d+\.\s/,"")});
    else if(s.indexOf("---")===0)out.push({t:"hr"});
    else out.push({t:"p",x:s});
  });
  flush();
  return out;
}

    const lines=c.content.split("\n"); const parts=[]; let curL=[];
    lines.forEach(l=>{ if(/^##\s/.test(l) && curL.length){parts.push(curL.join("\n"));curL=[l];} else curL.push(l); });
    if(curL.length)parts.push(curL.join("\n"));
    const sys=`Tu es expert STAPS. On te donne une liste de SOURCES numérotées et un EXTRAIT de cours. Ajoute une citation [N] à la fin de PRESQUE chaque paragraphe, point de liste et ligne de tableau de cet extrait, avec le(s) numéro(s) de source les plus pertinents (réutilise/combine [N][M] si utile). NE CHANGE RIEN d'autre : ni le texte, ni les titres, ni les balises ([SCHÉMA: ...], tableaux |..|). Garde les [N] déjà présents. Renvoie UNIQUEMENT l'extrait modifié, sans commentaire.`;
    const out=[];
    for(let i=0;i<parts.length;i++){
      setSrcBusy(`🔗 Sourçage ${i+1}/${parts.length}…`);
      let r;
      try{
        r=await Promise.race([
          cl(sys,`SOURCES :\n${srcList}\n\nEXTRAIT :\n${parts[i]}\n\nRenvoie l'extrait avec les [N] ajoutés.`,[]),
          new Promise((_,rej)=>setTimeout(()=>rej(new Error("timeout")),60000))
        ]);
      }catch(e){ r=null; }
      out.push((r && !/^Erreur/i.test(r)) ? r.trim() : parts[i]); // en cas d'échec on garde l'original
    }
    pushUndo(c.content);
    const merged=out.join("\n\n");
    setCourses(cc=>{const nc=[...cc];nc[activeC]={...nc[activeC],content:merged,sources:srcs};return nc;});
  }catch(e){alert("Sourçage interrompu : "+e.message);}
  setSrcBusy("");
}

async function selEdit(instr){

  if(!courses[activeC])return;

  const content=courses[activeC].content;
  try{
    // 1) Méthode CIBLÉE (rapide) : l'IA ne renvoie que le fragment exact + sa version modifiée
    const r=await cl(
      `Tu reçois un COURS complet et un PASSAGE surligné par l'utilisateur. Étapes :
1) Retrouve dans le cours le fragment EXACT (copié mot pour mot tel qu'il apparaît, AVEC ses balises markdown : **gras**, [SCHÉMA: ...], [ORGANIGRAMME: ...], lignes de tableau |..|) qui correspond au passage surligné.
2) Applique la demande UNIQUEMENT à ce fragment.
Réponds STRICTEMENT dans ce format, sans aucun autre texte :
[[ORIGINAL]]
(le fragment exact copié du cours, sans rien changer)
[[NOUVEAU]]
(le fragment modifié)
[[FIN]]
RÈGLES IMPORTANTES pour le fragment modifié : garde un markdown propre. N'utilise JAMAIS de bloc de code (\`\`\`). Ne mets JAMAIS un tableau à l'intérieur d'une citation (>). Un tableau doit être en lignes |col|col| normales, une citation en "> texte" sur une seule ligne.`,
      `COURS :\n${content}\n\nPASSAGE SURLIGNÉ :\n"""${selText}"""\n\nDEMANDE : ${instr}`,
      []
    );
    if(r && r.indexOf("[[ORIGINAL]]")>-1 && r.indexOf("[[NOUVEAU]]")>-1 && r.indexOf("[[FIN]]")>-1){
      const oldT=r.split("[[ORIGINAL]]")[1].split("[[NOUVEAU]]")[0].replace(/^\n+|\n+$/g,"");
      const newT=r.split("[[NOUVEAU]]")[1].split("[[FIN]]")[0].replace(/^\n+|\n+$/g,"");

    // 2) Repli FIABLE (plus lent) : régénère le cours complet si le fragment n'a pas été retrouvé
    setSelBusy("✏️ Application (cours complet)…");
    const full=await cl(
      `Expert STAPS. On te donne un COURS et un PASSAGE surligné. Applique la demande uniquement à ce passage, garde tout le reste mot pour mot et les balises ([SCHÉMA:],[ORGANIGRAMME:],tableaux). Renvoie le COURS COMPLET modifié, sans commentaire.`,

      []

    if(full && !/^Erreur/i.test(full)){pushUndo(content);applyContent(full);setSelOpen(false);}

  setSelBusy("");
}

async function handleFiles(fileList, setter) {

    if (f.size > 20*1024*1024) { alert(`⚠️ ${f.name} trop volumineux (max 20 Mo)`); continue; }

  }
  setter(prev => [...prev, ...processed]);
}

// ── SVG generators ──
function genFlowSVG(items, colors){
  const w=Math.min(items.length*160+40,700), h=90;
  const bw=120, bh=40, gap=(w-40)/(items.length);
  const cols=colors||["#f97316","#3b82f6","#22c55e","#a855f7","#ec4899","#eab308","#14b8a6","#ef4444"];
  return `<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-height:100px">
    <defs><filter id="fs"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity=".15"/></filter></defs>
    ${items.map((it,i)=>{
      const x=20+i*gap, c=cols[i%cols.length];
      return `<g filter="url(#fs)"><rect x="${x}" y="20" width="${bw}" height="${bh}" rx="8" fill="${c}" opacity=".9"/>
      <text x="${x+bw/2}" y="44" text-anchor="middle" fill="#fff" font-size="10" font-weight="600" font-family="Outfit,sans-serif">${it.length>16?it.substring(0,15)+'…':it}</text></g>
      ${i<items.length-1?`<line x1="${x+bw+4}" y1="40" x2="${x+gap-4}" y2="40" stroke="#8899b5" stroke-width="2" marker-end="url(#ah)"/>`:''}`;
    }).join('')}
    <defs><marker id="ah" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#8899b5"/></marker></defs>
  </svg>`;
}

function genTreeSVG(root, children){
  const n=children.length, w=Math.max(n*140+40,300), h=140;
  const cols=["#3b82f6","#22c55e","#a855f7","#f97316","#ec4899","#eab308","#14b8a6","#ef4444"];
  return `<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-height:150px">
    <defs><filter id="ts"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity=".15"/></filter></defs>
    <g filter="url(#ts)"><rect x="${w/2-70}" y="8" width="140" height="36" rx="18" fill="#f97316"/>
    <text x="${w/2}" y="30" text-anchor="middle" fill="#fff" font-size="11" font-weight="700" font-family="Outfit,sans-serif">${root.length>20?root.substring(0,19)+'…':root}</text></g>
    ${children.map((c,i)=>{
      const x=20+i*((w-40)/n), col=cols[i%cols.length];
      return `<line x1="${w/2}" y1="44" x2="${x+55}" y2="70" stroke="${col}" stroke-width="2" opacity=".6"/>
      <g filter="url(#ts)"><rect x="${x}" y="70" width="110" height="34" rx="8" fill="${col}" opacity=".85"/>

    }).join('')}
  </svg>`;
}

function genRadialSVG(center, branches){
  const n=branches.length, r=85, cx=150, cy=110, w=300, h=220;
  const cols=["#3b82f6","#22c55e","#a855f7","#f97316","#ec4899","#eab308","#14b8a6","#ef4444"];

    <defs><filter id="rs"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity=".12"/></filter></defs>

      const angle=(2*Math.PI*i/n)-Math.PI/2, bx=cx+r*Math.cos(angle), by=cy+r*Math.sin(angle), col=cols[i%cols.length];
      return `<line x1="${cx}" y1="${cy}" x2="${bx}" y2="${by}" stroke="${col}" stroke-width="2" opacity=".4"/>
      <g filter="url(#rs)"><rect x="${bx-45}" y="${by-15}" width="90" height="30" rx="15" fill="${col}" opacity=".9"/>
      <text x="${bx}" y="${by+4}" text-anchor="middle" fill="#fff" font-size="8" font-weight="600" font-family="Outfit,sans-serif">${b.length>14?b.substring(0,13)+'…':b}</text></g>`;

    <text x="${cx}" y="${cy+4}" text-anchor="middle" fill="#fff" font-size="9" font-weight="700" font-family="Outfit,sans-serif">${center.length>14?center.substring(0,13)+'…':center}</text></g>

function parseSchemaItems(text){
  const clean=text.replace(/^\[SCHÉMA[:\s]*/i,'').replace(/^\[SCHEMA[:\s]*/i,'').replace(/\]$/,'');
  if(clean.includes('→')||clean.includes('->')) return clean.split(/→|->/).map(s=>s.trim()).filter(Boolean);
  if(clean.includes(',')) return clean.split(',').map(s=>s.trim()).filter(Boolean);
  if(clean.includes('—')) return clean.split('—').map(s=>s.trim()).filter(s=>s.length>2);
  if(clean.includes('/')) return clean.split('/').map(s=>s.trim()).filter(Boolean);
  return clean.split(/\s{2,}/).map(s=>s.trim()).filter(s=>s.length>2);
}

function parseOrgItems(text){
  const clean=text.replace(/^\[ORGANIGRAMME[:\s]*/i,'').replace(/\]$/,'');
  const parts=clean.includes('—')?clean.split('—').map(s=>s.trim()):clean.includes(':')? clean.split(':').map(s=>s.trim()):clean.split(',').map(s=>s.trim());
  return {root: parts[0]||"Organisation", children: parts.slice(1).length>0?parts.slice(1):["Élément 1","Élément 2","Élément 3"]};
}

// ── Inline : gras **..** + citations [N] (surlignables par source) ──
function citeNodes(str,kp){
  const out=[];let last=0,m,idx=0;const re=/\[(\d+)\]/g;
  while((m=re.exec(str))){
    if(m.index>last)out.push(str.slice(last,m.index));
    out.push(<span key={kp+"-c"+idx} className="cite" data-src={m[1]}>[{m[1]}]</span>);
    last=m.index+m[0].length;idx++;
  }
  if(last<str.length)out.push(str.slice(last));
  return out.length?out:str;
}
function renderInline(text){
  const parts=text.split(/\*\*(.*?)\*\*/g);
  return parts.map((p,i)=> i%2===1 ? <strong key={i} style={{color:"#fdba74"}}>{p}</strong> : <React.Fragment key={i}>{citeNodes(p,"i"+i)}</React.Fragment>);
}

// ── Parse markdown table ──
function parseTable(lines){
  const rows=lines.map(l=>l.split('|').map(c=>c.trim()).filter(Boolean));
  if(rows.length<2) return null;
  const header=rows[0];
  const body=rows.filter((_,i)=>i>0&&!rows[i].every(c=>/^[-:]+$/.test(c)));
  return {header,body};
}

function RichRenderer({text, mode}){
  if(!text) return null;
  if(mode==="text") return <TextRenderer text={text}/>;
  
  const lines=text.split('\n');
  const sections=[];
  let current=null;
  
  lines.forEach(l=>{
    if(l.startsWith('# ')){
      sections.push({type:'title',text:l.slice(2)});
    } else if(l.startsWith('## ')){
      if(current) sections.push(current);
      current={type:'section',title:l.slice(3),lines:[]};
    } else if(current){
      current.lines.push(l);
    } else {
      if(!sections.find(s=>s.type==='intro')) sections.push({type:'intro',lines:[l]});
      else { const intro=sections.find(s=>s.type==='intro'); if(intro) intro.lines.push(l); }
    }
  });
  if(current) sections.push(current);

  let secIdx=0;
  return (
    <div className="rich-view">
      {sections.map((sec,si)=>{
        if(sec.type==='title') return (
          <div key={si} className="rv-title-card">
            <div className="rv-title-icon">🎓</div>
            <h1 className="rv-title">{sec.text}</h1>
            <div className="rv-title-sub">UFR STAPS Bourgogne · Ophélie CUYNET</div>
          </div>
        );
        if(sec.type==='intro') return (
          <div key={si} className="rv-intro-card">
            {sec.lines.map((l,i)=> l.trim() ? <p key={i} className="rv-p">{renderInline(l)}</p> : null)}
          </div>
        );
        const color=secColors[secIdx%secColors.length];
        secIdx++;
        const icon=getSectionIcon(sec.title);
        
        return (
          <div key={si} className="rv-card" style={{"--card-color":color}}>
            <div className="rv-card-header">
              <span className="rv-card-icon">{icon}</span>
              <h2 className="rv-card-title">{sec.title}</h2>
              <div className="rv-card-accent" style={{background:color}}/>
            </div>
            <div className="rv-card-body">
              {renderSectionLines(sec.lines, color)}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function renderSectionLines(lines, color){
  const elements=[];
  let tableLines=[];
  let inTable=false;
  
  lines.forEach((l,i)=>{
    // Table accumulation
    if(l.startsWith('|')){
      inTable=true; tableLines.push(l); return;
    } else if(inTable){
      const tbl=parseTable(tableLines);
      if(tbl) elements.push(<RichTable key={`t${i}`} data={tbl} color={color}/>);
      tableLines=[]; inTable=false;
    }
    
    if(l.startsWith('### ')) elements.push(<h3 key={i} className="rv-h3"><span className="rv-h3-dot" style={{background:color}}/>{ l.slice(4)}</h3>);
    else if(l.startsWith('#### ')) elements.push(<h4 key={i} className="rv-h4">{l.slice(5)}</h4>);
    else if(/^\[SCHÉMA|^\[SCHEMA/i.test(l)){
      const items=parseSchemaItems(l);
      if(items.length>=2){
        if(items.length<=6) elements.push(<div key={i} className="rv-svg-box" dangerouslySetInnerHTML={{__html:genFlowSVG(items)}}/>);
        else elements.push(<div key={i} className="rv-svg-box" dangerouslySetInnerHTML={{__html:genRadialSVG(items[0],items.slice(1))}}/>);
      }
      elements.push(<div key={`d${i}`} className="rv-schema-label">📊 {l.replace(/^\[SCHÉMA[:\s]*/i,'').replace(/^\[SCHEMA[:\s]*/i,'').replace(/\]$/,'')}</div>);
    }
    else if(/^\[ORGANIGRAMME/i.test(l)){
      const org=parseOrgItems(l);
      elements.push(<div key={i} className="rv-svg-box" dangerouslySetInnerHTML={{__html:genTreeSVG(org.root,org.children)}}/>);
      elements.push(<div key={`d${i}`} className="rv-org-label">🗂️ {l.replace(/^\[ORGANIGRAMME[:\s]*/i,'').replace(/\]$/,'')}</div>);
    }
    else if(/^\[TABLEAU/i.test(l)) elements.push(<div key={i} className="rv-callout" style={{borderLeftColor:"#14b8a6"}}>📋 {l.replace(/^\[TABLEAU[:\s]*/i,'').replace(/\]$/,'')}</div>);
    else if(l.startsWith('> ')) elements.push(<div key={i} className="rv-callout" style={{borderLeftColor:color}}>💡 {l.slice(2)}</div>);
    else if(/^[-*] /.test(l)) elements.push(<div key={i} className="rv-li"><span className="rv-bullet" style={{background:color}}/><span>{renderInline(l.slice(2))}</span></div>);
    else if(/^\d+\.\s/.test(l)){
      const num=l.match(/^(\d+)\./)[1];
      elements.push(<div key={i} className="rv-num-item"><span className="rv-num" style={{background:color}}>{num}</span><span>{renderInline(l.replace(/^\d+\.\s*/,''))}</span></div>);
    }
    else if(l.startsWith('---')) elements.push(<div key={i} className="rv-divider"/>);
    else if(l.trim()) elements.push(<p key={i} className="rv-p">{renderInline(l)}</p>);
  });
  
  // flush remaining table
  if(inTable && tableLines.length>0){
    const tbl=parseTable(tableLines);
    if(tbl) elements.push(<RichTable key="tlast" data={tbl} color={color}/>);
  }
  
  return elements;
}

// ── Plain text fallback ──
function TextRenderer({text}){
  if(!text) return null;
  return (
    <div>{text.split('\n').map((l,i)=>{
      if(l.startsWith('# ')) return <h1 key={i} className="md-h1">{l.slice(2)}</h1>;
      if(l.startsWith('## ')) return <h2 key={i} className="md-h2">{l.slice(3)}</h2>;
      if(l.startsWith('### ')) return <h3 key={i} className="md-h3">{l.slice(4)}</h3>;
      if(l.startsWith('#### ')) return <h4 key={i} className="md-h4">{l.slice(5)}</h4>;
      if(/^[-*] /.test(l)) return <li key={i} className="md-li">{l.slice(2)}</li>;
      if(l.startsWith('> ')) return <blockquote key={i} className="md-bq">{l.slice(2)}</blockquote>;
      if(l.startsWith('|')) return <div key={i} className="md-tl"><code>{l}</code></div>;
      if(/^\[SCHÉMA|^\[SCHEMA/i.test(l)) return <div key={i} className="md-schema">📊 {l}</div>;
      if(/^\[ORGANIGRAMME/i.test(l)) return <div key={i} className="md-org">🗂️ {l}</div>;
      if(!l.trim()) return <div key={i} style={{height:4}}/>;
      if(l.startsWith('---')) return <hr key={i} className="md-hr"/>;
      return <p key={i} className="md-p">{renderInline(l)}</p>;
    })}</div>
  );
}

.vid-emoji{font-size:66px;line-height:1;animation:vpop .6s cubic-bezier(.2,1.4,.4,1)}
.vid-stitle{font-size:40px;font-weight:800;line-height:1.08;background:linear-gradient(135deg,#ffffff,#f97316,#eab308);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:vup .6s .08s both}
.vid-key{font-size:21px;font-weight:800;color:#fff;background:linear-gradient(135deg,#f97316,#c2410c);padding:9px 24px;border-radius:30px;box-shadow:0 10px 34px #f9731677;animation:vpop .7s .18s both;letter-spacing:.5px}
.vid-points{list-style:none;padding:0;margin:2px 0;display:flex;flex-direction:column;gap:11px;max-width:680px;width:100%}
.vid-points li{font-size:22px;color:#eef2fb;background:#ffffff0e;border:1px solid #ffffff16;border-left:4px solid #f97316;border-radius:11px;padding:13px 20px;text-align:left;animation:vslide .5s both;line-height:1.35}
.vid-narr{font-size:15px;color:#aab4cc;font-style:italic;max-width:660px;animation:vfade 1s .3s both}
.vid-svg{width:100%;max-width:760px;background:#ffffff0a;border:1px solid #ffffff14;border-radius:16px;padding:20px;animation:vfade .8s both}
@keyframes vpop{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}
@keyframes vup{from{opacity:0;transform:translateY(26px)}to{opacity:1;transform:translateY(0)}}
@keyframes vslide{from{opacity:0;transform:translateX(-26px)}to{opacity:1;transform:translateX(0)}}
@keyframes vfade{from{opacity:0}to{opacity:1}}
.vid-bar{padding:12px 24px 22px;display:flex;flex-direction:column;gap:12px;align-items:center;flex-shrink:0}
.vid-prog{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
.vid-dot{width:26px;height:5px;border-radius:3px;background:#ffffff24;cursor:pointer;transition:all .2s}
.vid-dot.on{background:#f97316;width:42px}
.vid-dot.done{background:#f9731685}
.vid-ctrls{display:flex;gap:9px;align-items:center}
.vid-ctrls button{background:#ffffff16;border:none;color:#fff;width:48px;height:48px;border-radius:50%;cursor:pointer;font-size:18px;font-family:inherit;transition:all .15s}
.vid-ctrls button:hover{background:#ffffff2e;transform:scale(1.08)}
.vid-ctrls button.on{background:#f9731648}
.vid-count{font-size:12px;color:#8899b5}
@media(max-width:640px){.vid-stitle{font-size:30px}.vid-points li{font-size:18px}.vid-emoji{font-size:52px}}

      </div>

      {/* Tags */}
      <div className="hist-card-tags">
        {h.promoCours&&<span className="hist-tag promo">{h.promoCours}</span>}
        {!h.promoCours&&<span className="hist-tag promo">{h.promo||"—"}</span>}
        {h.sport&&<span className="hist-tag sport">{h.sport}</span>}
        <span className="hist-tag dur">{h.duration||"2h"}</span>
        {(h.nbCours||h.n||1)>1&&<span className="hist-tag multi">×{h.nbCours||h.n} cours</span>}
        {(Array.isArray(h.ct)?h.ct:[h.ct]).filter(Boolean).map(c=><span key={c} className="hist-tag type">{CT.find(t=>t.id===c)?.n||c}</span>)}
      </div>

      {/* Dates */}
      <div className="hist-card-dates">
        {h.dateCours&&<div className="hist-date-main">📅 Cours prévu : <strong>{fmtDate(h.dateCours)}</strong></div>}
        <div className="hist-date-gen">Généré le {h.dateLabel||new Date(h.date).toLocaleString("fr-FR")}</div>
      </div>

      {/* Actions */}
      <div className="hist-card-actions">
        {h.courses&&h.courses.length>0?
          <button className="hist-open" onClick={()=>openFromHistory(h)}>📖 Ouvrir le cours</button>
          :<span style={{fontSize:9,color:"#5a6a85"}}>Ancien format</span>
        }
        <button className="hist-del" onClick={()=>{if(confirm("Supprimer ?"))deleteFromHistory(h.id);}}>🗑️</button>
      </div>
    </div>)}
  </div>}
  </>;
})()}


</main>
<footer className="ft">STAPS Course Studio v4 · Multi-cours · Export appli STAPS suite · Claude + Perplexity · Ophélie CUYNET · UFR STAPS Bourgogne 2025-2026</footer>
</div>);
}

ReactDOM.render(React.createElement(App), document.getElementById('root'));
</script>
</body>
</html>
