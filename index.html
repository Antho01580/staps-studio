async function ppx(p){try{const r=await fetch("https://api.perplexity.ai/chat/completions",{method:"POST",headers:{"Authorization":`Bearer ${PK}`,"Content-Type":"application/json"},body:JSON.stringify({model:"sonar-pro",messages:[{role:"system",content:"Expert STAPS, pédagogie universitaire, formation sportive France. Toujours sourcé."},{role:"user",content:p}],max_tokens:4000,temperature:.3,return_citations:true})});const d=await r.json();return{c:d.choices?.[0]?.message?.content||"",s:d.citations||[]};}catch(e){return{c:"",s:[]};}}
async function cl(s, u, files=[]){
  try {
    // Build multimodal content: text + attached files (PDF/images)
    const content = [];
    for (const f of files) {
      if (f.type === "application/pdf") {
        content.push({type:"document",source:{type:"base64",media_type:"application/pdf",data:f.data}});
        content.push({type:"text",text:`[Document joint: "${f.name}" — Utilise ce document comme référence pour enrichir le cours]`});
      } else if (f.type.startsWith("image/")) {
        content.push({type:"image",source:{type:"base64",media_type:f.type,data:f.data}});
        content.push({type:"text",text:`[Image jointe: "${f.name}" — Décris et intègre cette ressource visuelle dans le cours]`});
      } else {
        // text/csv/json/etc: include as text
        content.push({type:"text",text:`[Fichier joint: "${f.name}"]\n${f.text||"(contenu binaire non lisible)"}`});
      }
    }
    content.push({type:"text",text:u});
    const r = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":CK,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:MODEL,max_tokens:8000,system:s,messages:[{role:"user",content: files.length > 0 ? content : u}]})
    });
    const d = await r.json();
    return d.content?.[0]?.text || d.error?.message || "Erreur";
  } catch(e){return "Erreur: "+e.message;}
}

// ── File reading helpers ──
function readFileAsBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(",")[1]);
    r.onerror = () => rej(new Error("Lecture échouée"));
    r.readAsDataURL(file);
  });
}
function readFileAsText(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = () => rej(new Error("Lecture échouée"));
    r.readAsText(file);
  });
}
async function processFile(file) {
  const isPdf = file.type === "application/pdf";
  const isImage = file.type.startsWith("image/");
  const isText = file.type.startsWith("text/") || file.name.endsWith(".md") || file.name.endsWith(".json") || file.name.endsWith(".csv");
  if (isPdf || isImage) {
    const data = await readFileAsBase64(file);
    return {name: file.name, type: file.type, data, size: file.size};
  } else if (isText) {
    const text = await readFileAsText(file);
    return {name: file.name, type: file.type, text, size: file.size};
  } else {
    // Try as text
    try { const text = await readFileAsText(file); return {name: file.name, type: "text/plain", text, size: file.size}; }
    catch { return {name: file.name, type: file.type, text: "(format non supporté)", size: file.size}; }
  }
}

function genFlowSVG(items, colors){
  const w=Math.min(items.length*160+40,700), h=90;
  const bw=120, bh=40, gap=(w-40)/(items.length);
  const cols=colors||["#f97316","#3b82f6","#22c55e","#a855f7","#ec4899","#eab308","#14b8a6","#ef4444"];
  return `<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-height:100px">
    <defs><filter id="fs"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity=".15"/></filter></defs>
    ${items.map((it,i)=>{
      const x=20+i*gap, c=cols[i%cols.length];
      return `<g filter="url(#fs)"><rect x="${x}" y="20" width="${bw}" height="${bh}" rx="8" fill="${c}" opacity=".9"/>
      <text x="${x+bw/2}" y="44" text-anchor="middle" fill="#fff" font-size="10" font-weight="600" font-family="Outfit,sans-serif">${it.length>16?it.substring(0,15)+'…':it}</text></g>
      ${i<items.length-1?`<line x1="${x+bw+4}" y1="40" x2="${x+gap-4}" y2="40" stroke="#8899b5" stroke-width="2" marker-end="url(#ah)"/>`:''}`;
    }).join('')}
    <defs><marker id="ah" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#8899b5"/></marker></defs>
  </svg>`;
}

      const x=20+i*((w-40)/n), col=cols[i%cols.length];
      return `<line x1="${w/2}" y1="44" x2="${x+55}" y2="70" stroke="${col}" stroke-width="2" opacity=".6"/>
      <g filter="url(#ts)"><rect x="${x}" y="70" width="110" height="34" rx="8" fill="${col}" opacity=".85"/>
      <text x="${x+55}" y="91" text-anchor="middle" fill="#fff" font-size="9" font-weight="600" font-family="Outfit,sans-serif">${c.length>16?c.substring(0,15)+'…':c}</text></g>`;
    }).join('')}
  </svg>`;
}

function genRadialSVG(center, branches){
  const n=branches.length, r=85, cx=150, cy=110, w=300, h=220;
  const cols=["#3b82f6","#22c55e","#a855f7","#f97316","#ec4899","#eab308","#14b8a6","#ef4444"];
  return `<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-height:220px">
    <defs><filter id="rs"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity=".12"/></filter></defs>
    ${branches.map((b,i)=>{
      const angle=(2*Math.PI*i/n)-Math.PI/2, bx=cx+r*Math.cos(angle), by=cy+r*Math.sin(angle), col=cols[i%cols.length];
      return `<line x1="${cx}" y1="${cy}" x2="${bx}" y2="${by}" stroke="${col}" stroke-width="2" opacity=".4"/>
      <g filter="url(#rs)"><rect x="${bx-45}" y="${by-15}" width="90" height="30" rx="15" fill="${col}" opacity=".9"/>
      <text x="${bx}" y="${by+4}" text-anchor="middle" fill="#fff" font-size="8" font-weight="600" font-family="Outfit,sans-serif">${b.length>14?b.substring(0,13)+'…':b}</text></g>`;
    }).join('')}
    <g filter="url(#rs)"><circle cx="${cx}" cy="${cy}" r="32" fill="#f97316"/>
    <text x="${cx}" y="${cy+4}" text-anchor="middle" fill="#fff" font-size="9" font-weight="700" font-family="Outfit,sans-serif">${center.length>14?center.substring(0,13)+'…':center}</text></g>
  </svg>`;
}

function parseSchemaItems(text){
  const clean=text.replace(/^\[SCHÉMA[:\s]*/i,'').replace(/^\[SCHEMA[:\s]*/i,'').replace(/\]$/,'');
  if(clean.includes('→')||clean.includes('->')) return clean.split(/→|->/).map(s=>s.trim()).filter(Boolean);
  if(clean.includes(',')) return clean.split(',').map(s=>s.trim()).filter(Boolean);
  if(clean.includes('—')) return clean.split('—').map(s=>s.trim()).filter(s=>s.length>2);
  if(clean.includes('/')) return clean.split('/').map(s=>s.trim()).filter(Boolean);
  return clean.split(/\s{2,}/).map(s=>s.trim()).filter(s=>s.length>2);
}

function parseOrgItems(text){
  const clean=text.replace(/^\[ORGANIGRAMME[:\s]*/i,'').replace(/\]$/,'');
  const parts=clean.includes('—')?clean.split('—').map(s=>s.trim()):clean.includes(':')? clean.split(':').map(s=>s.trim()):clean.split(',').map(s=>s.trim());
  return {root: parts[0]||"Organisation", children: parts.slice(1).length>0?parts.slice(1):["Élément 1","Élément 2","Élément 3"]};
}

// ── Inline : gras **..** + citations [N] (surlignables par source) ──
function citeNodes(str,kp){
  const out=[];let last=0,m,idx=0;const re=/\[(\d+)\]/g;
  while((m=re.exec(str))){
    if(m.index>last)out.push(str.slice(last,m.index));
    out.push(<span key={kp+"-c"+idx} className="cite" data-src={m[1]}>[{m[1]}]</span>);
    last=m.index+m[0].length;idx++;
  }
  if(last<str.length)out.push(str.slice(last));
  return out.length?out:str;
}
function renderInline(text){
  const parts=text.split(/\*\*(.*?)\*\*/g);
  return parts.map((p,i)=> i%2===1 ? <strong key={i} style={{color:"#fdba74"}}>{p}</strong> : <React.Fragment key={i}>{citeNodes(p,"i"+i)}</React.Fragment>);
}

// ── Parse markdown table ──
function parseTable(lines){
  const rows=lines.map(l=>l.split('|').map(c=>c.trim()).filter(Boolean));
  if(rows.length<2) return null;
  const header=rows[0];
  const body=rows.filter((_,i)=>i>0&&!rows[i].every(c=>/^[-:]+$/.test(c)));
  return {header,body};
}

const secIcons={"introduction":"💡","intro":"💡","accroche":"🎯","objectif":"🎯","information":"ℹ️","corps":"📖","activit":"🏃","exercice":"✏️","synthèse":"📌","synthese":"📌","point":"📌","évaluation":"✅","evaluation":"✅","bibliographie":"📚","ressource":"🔗","conclusion":"🏁"};
function getSectionIcon(title){
  const t=title.toLowerCase();
  for(const[k,v] of Object.entries(secIcons)) if(t.includes(k)) return v;
  return "📘";
}
const secColors=["#3b82f6","#22c55e","#a855f7","#f97316","#ec4899","#eab308","#14b8a6","#ef4444","#6366f1","#0ea5e9"];

// ── RICH RENDERER ──
function RichRenderer({text, mode}){
  if(!text) return null;
  if(mode==="text") return <TextRenderer text={text}/>;
  
  const lines=text.split('\n');
  const sections=[];
  let current=null;
  
  lines.forEach(l=>{
    if(l.startsWith('# ')){
      sections.push({type:'title',text:l.slice(2)});
    } else if(l.startsWith('## ')){
      if(current) sections.push(current);
      current={type:'section',title:l.slice(3),lines:[]};
    } else if(current){
      current.lines.push(l);
    } else {
      if(!sections.find(s=>s.type==='intro')) sections.push({type:'intro',lines:[l]});
      else { const intro=sections.find(s=>s.type==='intro'); if(intro) intro.lines.push(l); }
    }
  });
  if(current) sections.push(current);

  let secIdx=0;
  return (
    <div className="rich-view">
      {sections.map((sec,si)=>{
        if(sec.type==='title') return (
          <div key={si} className="rv-title-card">
            <div className="rv-title-icon">🎓</div>
            <h1 className="rv-title">{sec.text}</h1>
            <div className="rv-title-sub">UFR STAPS Bourgogne · Ophélie CUYNET</div>
          </div>
        );
        if(sec.type==='intro') return (
          <div key={si} className="rv-intro-card">
            {sec.lines.map((l,i)=> l.trim() ? <p key={i} className="rv-p">{renderInline(l)}</p> : null)}
          </div>
        );
        const color=secColors[secIdx%secColors.length];
        secIdx++;
        const icon=getSectionIcon(sec.title);
        
        return (
          <div key={si} className="rv-card" style={{"--card-color":color}}>
            <div className="rv-card-header">
              <span className="rv-card-icon">{icon}</span>
              <h2 className="rv-card-title">{sec.title}</h2>
              <div className="rv-card-accent" style={{background:color}}/>
            </div>
            <div className="rv-card-body">
              {renderSectionLines(sec.lines, color)}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function renderSectionLines(lines, color){
  const elements=[];
  let tableLines=[];
  let inTable=false;
  
  lines.forEach((l,i)=>{
    // Table accumulation
    if(l.startsWith('|')){
      inTable=true; tableLines.push(l); return;
    } else if(inTable){
      const tbl=parseTable(tableLines);
      if(tbl) elements.push(<RichTable key={`t${i}`} data={tbl} color={color}/>);
      tableLines=[]; inTable=false;
    }
    
    if(l.startsWith('### ')) elements.push(<h3 key={i} className="rv-h3"><span className="rv-h3-dot" style={{background:color}}/>{ l.slice(4)}</h3>);
    else if(l.startsWith('#### ')) elements.push(<h4 key={i} className="rv-h4">{l.slice(5)}</h4>);
    else if(/^\[SCHÉMA|^\[SCHEMA/i.test(l)){
      const items=parseSchemaItems(l);
      if(items.length>=2){
        if(items.length<=6) elements.push(<div key={i} className="rv-svg-box" dangerouslySetInnerHTML={{__html:genFlowSVG(items)}}/>);
        else elements.push(<div key={i} className="rv-svg-box" dangerouslySetInnerHTML={{__html:genRadialSVG(items[0],items.slice(1))}}/>);
      }
      elements.push(<div key={`d${i}`} className="rv-schema-label">📊 {l.replace(/^\[SCHÉMA[:\s]*/i,'').replace(/^\[SCHEMA[:\s]*/i,'').replace(/\]$/,'')}</div>);
    }
    else if(/^\[ORGANIGRAMME/i.test(l)){
      const org=parseOrgItems(l);
      elements.push(<div key={i} className="rv-svg-box" dangerouslySetInnerHTML={{__html:genTreeSVG(org.root,org.children)}}/>);
      elements.push(<div key={`d${i}`} className="rv-org-label">🗂️ {l.replace(/^\[ORGANIGRAMME[:\s]*/i,'').replace(/\]$/,'')}</div>);
    }
    else if(/^\[TABLEAU/i.test(l)) elements.push(<div key={i} className="rv-callout" style={{borderLeftColor:"#14b8a6"}}>📋 {l.replace(/^\[TABLEAU[:\s]*/i,'').replace(/\]$/,'')}</div>);
    else if(l.startsWith('> ')) elements.push(<div key={i} className="rv-callout" style={{borderLeftColor:color}}>💡 {l.slice(2)}</div>);
    else if(/^[-*] /.test(l)) elements.push(<div key={i} className="rv-li"><span className="rv-bullet" style={{background:color}}/><span>{renderInline(l.slice(2))}</span></div>);
    else if(/^\d+\.\s/.test(l)){
      const num=l.match(/^(\d+)\./)[1];
      elements.push(<div key={i} className="rv-num-item"><span className="rv-num" style={{background:color}}>{num}</span><span>{renderInline(l.replace(/^\d+\.\s*/,''))}</span></div>);
    }
    else if(l.startsWith('---')) elements.push(<div key={i} className="rv-divider"/>);
    else if(l.trim()) elements.push(<p key={i} className="rv-p">{renderInline(l)}</p>);
  });
  
  // flush remaining table
  if(inTable && tableLines.length>0){
    const tbl=parseTable(tableLines);
    if(tbl) elements.push(<RichTable key="tlast" data={tbl} color={color}/>);
  }
  
  return elements;
}

function RichTable({data, color}){
  return (
    <div className="rv-table-wrap">
      <table className="rv-table">
        <thead><tr>{data.header.map((h,i)=> <th key={i} style={{borderBottomColor:color}}>{h}</th>)}</tr></thead>
        <tbody>{data.body.map((row,i)=> <tr key={i}>{row.map((c,j)=> <td key={j}>{c}</td>)}</tr>)}</tbody>
      </table>
    </div>
  );
}

// ── Plain text fallback ──
function TextRenderer({text}){
  if(!text) return null;
  return (
    <div>{text.split('\n').map((l,i)=>{
      if(l.startsWith('# ')) return <h1 key={i} className="md-h1">{l.slice(2)}</h1>;
      if(l.startsWith('## ')) return <h2 key={i} className="md-h2">{l.slice(3)}</h2>;
      if(l.startsWith('### ')) return <h3 key={i} className="md-h3">{l.slice(4)}</h3>;
      if(l.startsWith('#### ')) return <h4 key={i} className="md-h4">{l.slice(5)}</h4>;
      if(/^[-*] /.test(l)) return <li key={i} className="md-li">{l.slice(2)}</li>;
      if(l.startsWith('> ')) return <blockquote key={i} className="md-bq">{l.slice(2)}</blockquote>;
      if(l.startsWith('|')) return <div key={i} className="md-tl"><code>{l}</code></div>;
      if(/^\[SCHÉMA|^\[SCHEMA/i.test(l)) return <div key={i} className="md-schema">📊 {l}</div>;
      if(/^\[ORGANIGRAMME/i.test(l)) return <div key={i} className="md-org">🗂️ {l}</div>;
      if(!l.trim()) return <div key={i} style={{height:4}}/>;
      if(l.startsWith('---')) return <hr key={i} className="md-hr"/>;
      return <p key={i} className="md-p">{renderInline(l)}</p>;
    })}</div>
  );
}

<div className="fd"><label className="lb">Nombre de cours</label>
<div style={{display:"flex",gap:4,alignItems:"center"}}>
<input className="ip" type="number" min="1" max="10" value={cp.nbCours} onChange={e=>setCp(p=>({...p,nbCours:parseInt(e.target.value)||1}))} style={{width:60}}/>
<span style={{fontSize:10,color:"#8899b5"}}>cours de</span>
<select className="sl2" value={cp.dur} onChange={e=>setCp(p=>({...p,dur:e.target.value}))} style={{width:80}}>
{["1h","1h30","2h","2h30","3h","4h"].map(d=><option key={d}>{d}</option>)}</select>
<span style={{fontSize:10,color:"#8899b5"}}>chacun</span>
</div></div>
<div className="fd"><label className="lb">Niveau</label><select className="sl2" value={cp.lvl} onChange={e=>setCp(p=>({...p,lvl:e.target.value}))}>{["L1","L2","L3 APAS","L3 EM","L3 ES","L3 MS","M1 EOPS","DEUST 1","DEUST 2","LP","DU"].map(l=><option key={l}>{l}</option>)}</select></div>
</div>

{cp.nbCours > 1 && <div style={{background:"#f9731610",border:"1px solid #f9731630",borderRadius:6,padding:8,marginBottom:8,fontSize:10,color:"#fdba74"}}>
📚 <strong>Séquence de {cp.nbCours} cours</strong> : Claude va générer {cp.nbCours} cours progressifs de {cp.dur} avec une progression pédagogique cohérente du début à la fin.
</div>}

<div className="fd"><label className="lb">Type(s) de cours (multi-sélection)</label><div className="ctg">{CT.map(t=><button key={t.id} className={`ctb ${cp.ct.includes(t.id)?"a":""}`} onClick={()=>setCp(p=>({...p,ct:p.ct.includes(t.id)?p.ct.filter(x=>x!==t.id):[...p.ct,t.id]}))}><span style={{fontSize:14}}>{t.i}</span>{t.n}</button>)}</div></div>
<div className="fd"><label className="lb">Sport</label><select className="sl2" value={cp.sport} onChange={e=>setCp(p=>({...p,sport:e.target.value}))}><option value="">— Général —</option>{SP.map(s=><option key={s}>{s}</option>)}</select></div>
<div className="fdr">
<div className="fd"><label className="lb">Nb étudiants</label><input className="ip" type="number" value={cp.nb} onChange={e=>setCp(p=>({...p,nb:e.target.value}))}/></div>
<div className="fd"><label className="lb">Âge</label><input className="ip" value={cp.age} onChange={e=>setCp(p=>({...p,age:e.target.value}))} placeholder="18-22"/></div>
</div>
<div className="fd"><label className="lb">Objectifs</label><textarea className="ta2" rows={2} value={cp.obj} onChange={e=>setCp(p=>({...p,obj:e.target.value}))} placeholder="Comprendre les mécanismes..."/></div>
</div>

<div className="pn">
<h3 className="pt">🎨 Format & Contenu</h3>
<div className="fd"><label className="lb">Éléments</label><div className="og">{OO.map(o=><button key={o.id} className={`ob ${cp.opts.includes(o.id)?"a":""}`} onClick={()=>setCp(p=>({...p,opts:p.opts.includes(o.id)?p.opts.filter(x=>x!==o.id):[...p.opts,o.id]}))}>{o.n}</button>)}</div></div>
<div className="mr">
<button className={`mb ${evalM?"a":""}`} onClick={()=>setEvalM(!evalM)}>✅ Évaluation {evalM?"ON":"OFF"}</button>
<button className={`mb ${seanceM?"a":""}`} onClick={()=>setSeanceM(!seanceM)}>⚡ Séance Sport {seanceM?"ON":"OFF"}</button>
</div>
<div className="fd"><label className="lb">Instructions perso</label><textarea className="ta2" rows={2} value={cp.cust} onChange={e=>setCp(p=>({...p,cust:e.target.value}))} placeholder="Focus rugby, prévention..."/></div>

{/* FILE UPLOAD for creation */}
<div className="fd">
<label className="lb">📎 Documents de référence (PDF, cours, publications, images...)</label>
<div className="drop-zone" onClick={()=>createFileRef.current?.click()}
  onDragOver={e=>{e.preventDefault();e.currentTarget.style.borderColor="#f97316";}}
  onDragLeave={e=>{e.currentTarget.style.borderColor="#2a3550";}}
  onDrop={e=>{e.preventDefault();e.currentTarget.style.borderColor="#2a3550";handleFiles(e.dataTransfer.files,setCreateFiles);}}>
  <input ref={createFileRef} type="file" multiple accept=".pdf,.txt,.md,.csv,.json,.jpg,.jpeg,.png,.gif,.webp,.doc,.docx" style={{display:"none"}} onChange={e=>handleFiles(e.target.files,setCreateFiles)}/>
  <div style={{fontSize:20}}>📎</div>
  <div>Glissez vos fichiers ici ou <span style={{color:"#f97316",textDecoration:"underline",cursor:"pointer"}}>parcourir</span></div>
  <div style={{fontSize:9,color:"#5a6a85"}}>PDF · Images · Texte · Markdown · JSON · CSV (max 20 Mo/fichier)</div>
</div>
{createFiles.length>0&&<div className="file-list">
  {createFiles.map((f,i)=><div key={i} className="file-item">
    <span className="file-icon">{f.type==="application/pdf"?"📄":f.type?.startsWith("image/")?"🖼️":"📝"}</span>
    <span className="file-name">{f.name}</span>
    <span className="file-size">{(f.size/1024).toFixed(0)} Ko</span>
    <button className="file-rm" onClick={()=>removeFile(i,setCreateFiles)}>×</button>
  </div>)}
  <div style={{fontSize:9,color:"#86efac",marginTop:3}}>✅ {createFiles.length} document{createFiles.length>1?"s":""} — Claude les utilisera comme référence pour le cours</div>
</div>}
</div>

{/* Stagiaires / Groupes */}
<button style={{width:"100%",padding:8,borderRadius:6,border:"1px dashed #a855f740",background:showStudents?"#a855f710":"transparent",color:showStudents?"#c4b5fd":"#8899b5",cursor:"pointer",fontSize:10,fontWeight:600,fontFamily:"inherit",marginBottom:8}} onClick={()=>setShowStudents(!showStudents)}>
👥 Stagiaires & Groupes ({students.length} stagiaires, {groups.length} groupes) {showStudents?"▼":"▶"}
</button>
{showStudents&&<div className="st-panel">
<div style={{fontSize:11,fontWeight:700,marginBottom:4}}>Groupes</div>
<div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:6}}>
{groups.map((g,i)=><span key={i} style={{padding:"2px 8px",borderRadius:4,background:"#a855f720",color:"#c4b5fd",fontSize:10}}>{g} <button onClick={()=>setGroups(gs=>gs.filter((_,j)=>j!==i))} style={{background:"none",border:"none",color:"#ef4444",cursor:"pointer",fontSize:10}}>×</button></span>)}
<div style={{display:"flex",gap:3}}><input className="ip" value={newGrp} onChange={e=>setNewGrp(e.target.value)} placeholder="Nom du groupe" style={{width:120,fontSize:10,padding:4}}/><button className="mkb" onClick={addGroup} style={{width:24,height:24,fontSize:10}}>+</button></div>
</div>
<div style={{fontSize:11,fontWeight:700,marginBottom:4}}>Stagiaires</div>
{students.map(s=><div key={s.id} className="st-row">
<span style={{flex:1,fontWeight:600}}>{s.nom}</span><span>{s.sport}</span><span>{s.age}ans</span><span>{s.niveau}</span><span style={{color:"#c4b5fd"}}>{s.groupe}</span>
<button className="st-rm" onClick={()=>removeStudent(s.id)}>×</button>
</div>)}
<div className="st-add">
<input value={newSt.nom} onChange={e=>setNewSt(s=>({...s,nom:e.target.value}))} placeholder="Nom"/>
<input value={newSt.sport} onChange={e=>setNewSt(s=>({...s,sport:e.target.value}))} placeholder="Sport"/>
<input value={newSt.age} onChange={e=>setNewSt(s=>({...s,age:e.target.value}))} placeholder="Âge"/>
<select value={newSt.niveau} onChange={e=>setNewSt(s=>({...s,niveau:e.target.value}))}>
<option value="">Niveau</option><option>Débutant</option><option>Intermédiaire</option><option>Avancé</option><option>Expert</option></select>
<select value={newSt.groupe} onChange={e=>setNewSt(s=>({...s,groupe:e.target.value}))}>
<option value="">Groupe</option>{groups.map(g=><option key={g}>{g}</option>)}</select>
<button className="mkb" onClick={addStudent} style={{fontSize:10}}>+</button>
</div>
{students.length>0&&evalM&&<div style={{marginTop:8,fontSize:10,color:"#86efac",background:"#22c55e10",padding:6,borderRadius:4}}>✅ Les évaluations seront adaptées aux profils et groupes de vos {students.length} stagiaires.</div>}
</div>}

<button className="gn" onClick={generate} disabled={busy||!cp.theme}>{busy?step:`🚀 Générer ${cp.nbCours>1?`${cp.nbCours} cours séquencés`:"le cours"}`}</button>
{busy&&<div className="pg"><div className="pgf"/></div>}
</div>
</div>
</>}

{pg==="result"&&courses.length>0&&<>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10,flexWrap:"wrap",gap:6}}>
<div><h2 className="sec-t">📄 {courses.length>1?`Séquence de ${courses.length} cours`:"Cours Généré"}</h2>
<div style={{display:"flex",gap:6,fontSize:10,color:"#8899b5",marginTop:2,flexWrap:"wrap"}}>{cur?.semL&&<span>📚 {cur.semL}</span>}{cur?.ue&&<span>📝 {cur.ue}</span>}</div></div>
<div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
{undoStk.length>0&&<button className="ab" style={{color:"#fdba74",borderColor:"#f9731640"}} onClick={doUndo}>↩️ Annuler</button>}
<button className="ab" onClick={exportMD}>💾 .md</button>
<button className="ab" onClick={exportJSON}>📤 JSON</button>
<button className="ab" onClick={exportPostMessage}>📡 postMessage</button>
<button className="ab" onClick={exportURL}>🔗 URL</button>
<button className="ab" onClick={()=>navigator.clipboard.writeText(cur?.content||"")}>📋</button>
<button className="ab" onClick={()=>setPg("create")}>✨ Nouveau</button>
</div>
</div>

{/* Export info */}
<div style={{background:"#14b8a610",border:"1px solid #14b8a630",borderRadius:6,padding:8,marginBottom:10,fontSize:10,color:"#5eead4"}}>
📤 <strong>Export → Ophélie CUYNET Staps (appli suite) :</strong> JSON ({courses.length} cours{students.length>0?` + ${students.length} stagiaires`:""}) · postMessage <code style={{background:"#1a2236",padding:"1px 4px",borderRadius:3}}>{"{"}"type":"STAPS_IMPORT"{"}"}</code> · URL params <code style={{background:"#1a2236",padding:"1px 4px",borderRadius:3}}>?cours=...</code>
</div>

{/* Multi-course tabs + view mode */}
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,flexWrap:"wrap",gap:6}}>
{courses.length>1&&<div className="ctabs">{courses.map((c,i)=><button key={i} className={`ctab ${activeC===i?"a":""}`} onClick={()=>setActiveC(i)}>Cours {i+1}/{courses.length}</button>)}</div>}
<div className="ctabs" style={{marginLeft:"auto"}}>
<button className={`ctab ${viewMode==="slides"?"a":""}`} onClick={()=>setViewMode("slides")}>🎨 Présentation</button>
<button className={`ctab ${viewMode==="text"?"a":""}`} onClick={()=>setViewMode("text")}>📝 Texte brut</button>
</div>
</div>

<div className="sel-hint">🖱️ <strong>Astuce :</strong> sélectionne n'importe quel passage du cours pour le modifier, l'expliquer ou ajouter un schéma avec l'IA.</div>
<div className="rg">
<div className="cbox" onMouseUp={onCourseSelect}><RichRenderer text={cur?.content} mode={viewMode}/></div>
<div className="ebar">
<h3 style={{fontSize:13,fontWeight:700,marginBottom:4}}>🖊️ Modifier{courses.length>1?` (Cours ${activeC+1})`:""}</h3>
<div style={{display:"flex",flexDirection:"column",gap:2,marginBottom:6}}>
{["Plus de schémas","Cas pratique détaillé","Plus accessible","Évaluation formative","Exercices groupe","Bibliographie","Fiche séance","Exemples haut niveau","QCM 10 questions","Organigramme","Différencier par groupe/niveau"].map((p,i)=>
<button key={i} className="pb" onClick={()=>setEdit(p)}>{p}</button>)}
</div>
<textarea className="ta2" rows={3} value={edit} onChange={e=>setEdit(e.target.value)} placeholder="Modifications..." style={{marginBottom:5,fontSize:11}}/>

{/* FILE UPLOAD for editing */}
<div className="drop-zone-sm" onClick={()=>editFileRef.current?.click()}
  onDragOver={e=>{e.preventDefault();e.currentTarget.style.borderColor="#3b82f6";}}
  onDragLeave={e=>{e.currentTarget.style.borderColor="#2a3550";}}
  onDrop={e=>{e.preventDefault();e.currentTarget.style.borderColor="#2a3550";handleFiles(e.dataTransfer.files,setEditFiles);}}>
  <input ref={editFileRef} type="file" multiple accept=".pdf,.txt,.md,.csv,.json,.jpg,.jpeg,.png,.gif,.webp" style={{display:"none"}} onChange={e=>handleFiles(e.target.files,setEditFiles)}/>
  📎 Joindre des docs pour la modification
</div>
{editFiles.length>0&&<div className="file-list" style={{marginBottom:5}}>
  {editFiles.map((f,i)=><div key={i} className="file-item"><span className="file-icon">{f.type==="application/pdf"?"📄":"📝"}</span><span className="file-name">{f.name}</span><button className="file-rm" onClick={()=>removeFile(i,setEditFiles)}>×</button></div>)}
</div>}
<button className="ego" onClick={doEdit} disabled={editing||!edit}>{editing?"⏳":"🔄 Appliquer"}</button>
{cur?.sources?.length>0&&<div style={{marginTop:10,paddingTop:10,borderTop:"1px solid #2a3550"}}><div style={{fontSize:11,fontWeight:600,color:"#8899b5",marginBottom:3}}>🔗 Sources <span style={{fontWeight:400,fontSize:8,color:"#5a6a85"}}>(survole une source → ses citations s'allument dans le cours)</span></div>{cur.sources.map((s,i)=><a key={i} href={s} target="_blank" rel="noopener noreferrer" onMouseEnter={()=>setHovSrc(i+1)} onMouseLeave={()=>setHovSrc(null)} style={{display:"block",fontSize:8,color:hovSrc===i+1?"#fdba74":"#93c5fd",background:hovSrc===i+1?"#f9731620":"transparent",borderRadius:4,padding:"2px 4px",marginBottom:1,wordBreak:"break-all",textDecoration:"none"}}>[{i+1}] {s.length>45?s.substring(0,45)+"...":s}</a>)}</div>}
</div>
</div>
</>}

{pg==="history"&&(()=>{
  // Use promoCours (manual) as priority, fallback to promo (auto)
  const getPromo = h => h.promoCours || h.promo || h.f || "";
  const promos=[...new Set(hist.map(h=>getPromo(h)))].filter(Boolean).sort();
  // Filter
  const filtered=histFilter==="all"?hist:hist.filter(h=>getPromo(h)===histFilter);
  // Sort: by dateCours (manual) if set, otherwise by creation date
  const sorted=[...filtered].sort((a,b)=>{
    if(histSort==="cours"){
      const da=a.dateCours?new Date(a.dateCours).getTime():0;
      const db=b.dateCours?new Date(b.dateCours).getTime():0;
      if(da&&db) return da-db;
      if(da) return -1; if(db) return 1;
    }
    const da=new Date(a.date||0).getTime(), db=new Date(b.date||0).getTime();
    return histSort==="oldest"?da-db:db-da;
  });

  const fmtDate = d => { if(!d) return ""; try{return new Date(d+"T00:00:00").toLocaleDateString("fr-FR",{weekday:"short",day:"numeric",month:"long",year:"numeric"});}catch{return d;} };

  return <>
  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12,flexWrap:"wrap",gap:8}}>
    <div>
      <h2 className="sec-t">🕐 Historique des cours</h2>
      <div style={{fontSize:11,color:"#8899b5"}}>{hist.length} cours · Consultables et modifiables · Persistant entre sessions</div>
    </div>
    {hist.length>0&&<div style={{display:"flex",gap:4}}>
      <button className="ab" onClick={()=>{if(confirm("Supprimer tout l'historique ?"))setHist([]);}}>🗑️ Vider</button>
      <button className="ab" style={{color:"#ef4444",borderColor:"#ef444440"}} onClick={()=>{if(confirm("Reset TOTAL ?")){setHist([]);setCourses([]);setStudents([]);setGroups([]);localStorage.removeItem("staps_hist");localStorage.removeItem("staps_courses");localStorage.removeItem("staps_students");localStorage.removeItem("staps_groups");}}}>🔄 Reset</button>
    </div>}
  </div>

  {hist.length>0&&<div className="hist-bar">
    <div className="hist-filters">
      <span style={{fontSize:10,color:"#8899b5",fontWeight:600}}>PROMO :</span>
      <button className={`hist-fbtn ${histFilter==="all"?"a":""}`} onClick={()=>setHistFilter("all")}>Toutes ({hist.length})</button>
      {promos.map(p=><button key={p} className={`hist-fbtn ${histFilter===p?"a":""}`} onClick={()=>setHistFilter(p)}>{p} ({hist.filter(h=>getPromo(h)===p).length})</button>)}
    </div>
    <div className="hist-sort">
      <button className={`hist-sbtn ${histSort==="newest"?"a":""}`} onClick={()=>setHistSort("newest")}>⬇️ Récent</button>
      <button className={`hist-sbtn ${histSort==="oldest"?"a":""}`} onClick={()=>setHistSort("oldest")}>⬆️ Ancien</button>
      <button className={`hist-sbtn ${histSort==="cours"?"a":""}`} onClick={()=>setHistSort("cours")}>📅 Date cours</button>
    </div>
  </div>}

  {sorted.length===0?<div style={{textAlign:"center",padding:40,color:"#8899b5"}}>
    {hist.length===0?<>📭 Aucun cours généré<br/><br/><button className="bp" onClick={()=>setPg("create")}>✨ Créer</button></>
    :<>Aucun cours pour "{histFilter}"</>}
  </div>:
  <div className="hist-grid">
    {sorted.map(h => <div key={h.id} className="hist-card">
      {/* Header: icon + theme */}
      <div className="hist-card-top">
        <span className="hist-card-icon">{CT.find(t=>t.id===(Array.isArray(h.ct)?h.ct[0]:h.ct))?.i||"📄"}</span>
        <div className="hist-card-info">
          <div className="hist-card-theme">{h.theme}</div>
          <div className="hist-card-meta">
            {h.semester&&<span>{h.semester}</span>}
            {h.ue&&<span> · {h.ue}</span>}
          </div>
        </div>
      </div>

      {/* Editable: date cours + promo */}
      <div className="hist-edit-row">
        <div className="hist-edit-field">
          <label className="hist-edit-label">📅 Date du cours</label>
          <input type="date" className="hist-edit-input" value={h.dateCours||""} onChange={e=>updateHistEntry(h.id,"dateCours",e.target.value)}/>
          {h.dateCours&&<div className="hist-edit-display">{fmtDate(h.dateCours)}</div>}
        </div>
        <div className="hist-edit-field">
          <label className="hist-edit-label">🎓 Promo / Classe</label>
          <input className="hist-edit-input" value={h.promoCours||""} onChange={e=>updateHistEntry(h.id,"promoCours",e.target.value)} placeholder="Ex: L2 STAPS Dijon"/>
        </div>
      </div>

      {/* Tags */}
      <div className="hist-card-tags">
        {h.promoCours&&<span className="hist-tag promo">{h.promoCours}</span>}
        {!h.promoCours&&<span className="hist-tag promo">{h.promo||"—"}</span>}
        {h.sport&&<span className="hist-tag sport">{h.sport}</span>}
        <span className="hist-tag dur">{h.duration||"2h"}</span>
        {(h.nbCours||h.n||1)>1&&<span className="hist-tag multi">×{h.nbCours||h.n} cours</span>}
        {(Array.isArray(h.ct)?h.ct:[h.ct]).filter(Boolean).map(c=><span key={c} className="hist-tag type">{CT.find(t=>t.id===c)?.n||c}</span>)}
      </div>

      {/* Dates */}
      <div className="hist-card-dates">
        {h.dateCours&&<div className="hist-date-main">📅 Cours prévu : <strong>{fmtDate(h.dateCours)}</strong></div>}
        <div className="hist-date-gen">Généré le {h.dateLabel||new Date(h.date).toLocaleString("fr-FR")}</div>
      </div>

      {/* Actions */}
      <div className="hist-card-actions">
        {h.courses&&h.courses.length>0?
          <button className="hist-open" onClick={()=>openFromHistory(h)}>📖 Ouvrir le cours</button>
          :<span style={{fontSize:9,color:"#5a6a85"}}>Ancien format</span>
        }
        <button className="hist-del" onClick={()=>{if(confirm("Supprimer ?"))deleteFromHistory(h.id);}}>🗑️</button>
      </div>
    </div>)}
  </div>}
  </>;
})()}


</main>
<footer className="ft">STAPS Course Studio v4 · Multi-cours · Export appli STAPS suite · Claude + Perplexity · Ophélie CUYNET · UFR STAPS Bourgogne 2025-2026</footer>
</div>);
}

ReactDOM.render(React.createElement(App), document.getElementById('root'));
</script>
</body>
</html>
